# Nginx configuration for React + Vite SPA
# Handles client-side routing and static asset caching

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Cache static assets (hashed filenames from Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cache other static files
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Handle PDF files
    location ~* \.pdf$ {
        expires 1y;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Handle game assets (large files, no aggressive caching)
    location /games/ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri $uri/ =404;
    }

    # Handle files directory
    location /files/ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri $uri/ =404;
    }

    # Main SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}